archive_schema_version: 1
updated: "2026-05-01"
purpose: "Preserve non-final-paper work as inspectable repository provenance without promoting it into thesis-facing evidence."
archive_items:
  - archive_id: phase1_regional_reference_rerun
    launcher_entry_id: phase1_regional_reference_rerun
    path_patterns:
      - "config/phase1_regional_2016_2022.yaml"
      - "output/phase1_production_rerun/**"
      - "output/phase1_regional_2016_2022/**"
      - "docs/PHASE1_REGIONAL_2016_2022_REFERENCE_NOTE.md"
    status: archive_provenance
    thesis_facing: false
    reportable: false
    paper_reflected_as: "provenance only"
    claim_boundary: "Regional 2016-2022 reference work is not the focused Mindoro Phase 1 transport-provenance claim."
    why_archived: "Superseded by the focused Mindoro 2016-2023 pre-spill provenance lane selected for the final paper."
    rerun_allowed: true
    launcher_visibility: visible_archive
    protected_outputs:
      - "output/phase1_production_rerun/**"
      - "output/phase1_regional_2016_2022/**"
    notes: "Kept for audit traceability and historical comparison only."

  - archive_id: phase1_regional_reference_rerun_alias
    launcher_entry_id: phase1_production_rerun
    path_patterns:
      - "config/phase1_regional_2016_2022.yaml"
      - "output/phase1_production_rerun/**"
    status: archive_provenance
    thesis_facing: false
    reportable: false
    paper_reflected_as: "provenance only"
    claim_boundary: "Hidden compatibility alias; it does not create a separate reportable Phase 1 result."
    why_archived: "Preserves older launcher muscle memory while routing to the canonical regional reference archive entry."
    rerun_allowed: true
    launcher_visibility: hidden_alias
    protected_outputs:
      - "output/phase1_production_rerun/**"
    notes: "Alias resolves through launcher metadata and remains outside the main thesis evidence role."

  - archive_id: phase1_mindoro_focus_pre_spill_experiment_alias
    launcher_entry_id: phase1_mindoro_focus_pre_spill_experiment
    path_patterns:
      - "config/phase1_mindoro_focus_pre_spill_2016_2023.yaml"
      - "output/phase1_mindoro_focus_pre_spill_2016_2023/**"
    status: archive_provenance
    thesis_facing: false
    reportable: false
    paper_reflected_as: "provenance only"
    claim_boundary: "Hidden compatibility alias for the canonical focused Mindoro Phase 1 provenance entry."
    why_archived: "The alias remains available for compatibility, but the final paper uses phase1_mindoro_focus_provenance."
    rerun_allowed: true
    launcher_visibility: hidden_alias
    protected_outputs:
      - "output/phase1_mindoro_focus_pre_spill_2016_2023/**"
    notes: "Use phase1_mindoro_focus_provenance for final-paper-facing provenance."

  - archive_id: mindoro_march13_14_phase1_focus_trial
    launcher_entry_id: mindoro_march13_14_phase1_focus_trial
