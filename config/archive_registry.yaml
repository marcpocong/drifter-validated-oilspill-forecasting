    thesis_facing: false
    reportable: false
    paper_reflected_as: "provenance only"
    claim_boundary: "Trial branch is not the promoted B1 March 13 to March 14 public-observation validation."
    why_archived: "Retained to document the focused Phase 1 sensitivity path before the canonical B1 route was fixed."
    rerun_allowed: true
    launcher_visibility: visible_archive
    protected_outputs:
      - "output/CASE_MINDORO_RETRO_2023/phase3b_extended_public_scored_march13_14_reinit_phase1_mindoro_focus_pre_spill/**"
    notes: "Inspect only as archive provenance; do not cite as a separate validation result."

