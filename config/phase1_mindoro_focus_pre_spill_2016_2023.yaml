workflow_mode: phase1_mindoro_focus_pre_spill_2016_2023
workflow_track: historical_regional_validation
case_id: phase1_mindoro_focus_pre_spill_2016_2023
mode_label: Mindoro-focused Phase 1 recipe-provenance workflow
description: Separate pre-spill 2016-2023 Mindoro-focused drifter-calibration rerun used to finalize Mindoro B1 recipe provenance

# Focused Mindoro Chapter 3 support box.
# This is the separate Mindoro-specific provenance box used to finalize the B1 recipe story.
phase1_validation_box: [118.751, 124.305, 10.620, 16.026]
forcing_bbox_halo_degrees: 0.5
drifter_acquisition_halo_degrees: 3.0
output_root: output/phase1_mindoro_focus_pre_spill_2016_2023

historical_window:
  start_utc: "2016-01-01T00:00:00Z"
  end_utc: "2023-03-02T23:59:59Z"
  monthly_chunking: true

segment_policy:
  horizon_hours: 72
  timestep_hours: 6
  require_drogued_only: true
  require_non_overlapping_windows: true
  require_full_duration: true
  require_continuous_coverage: true
  require_all_points_inside_validation_box: true

transport_settings:
  direct_wind_drift_factor: 0.02
  enable_stokes_drift: true
  horizontal_diffusivity_m2s: 0.0
  weathering_enabled: false
  current_uncertainty: 0.0
  require_wave_stokes_reader: true

drifter:
  required: true
  mode: phase1_regional_monthly_chunks
  server: https://osmc.noaa.gov/erddap
  dataset_id: drifter_6hour_qc
  required_fields:
    - time
    - latitude
    - longitude
    - ID
    - ve
    - vn
    - err_lat
    - err_lon
    - drogue_lost_date
    - deploy_date
    - DrogueType
    - DrogueLength
    - DrogueDetectSensor

phase1_recipe_family:
  - cmems_era5
  - cmems_gfs
  - hycom_era5
  - hycom_gfs

gfs_preflight:
  require_full_accepted_month_coverage: true
  allow_secondary_source: true
  secondary_source_id: ucar_gdex_d084001

ranking_subset:
  mode: seasonal_start_months
  months: [2, 3, 4]
  label: mindoro_pre_spill_seasonal_subset_feb_apr
  empty_subset_behavior: hard_fail
  description: Rank recipes only on accepted segments whose start dates fall in February-April.

distance_audit_source_point:
  path: data/arcgis/CASE_MINDORO_RETRO_2023/source_point_metadata.geojson
  label: mindoro_source_point
  apply_to_registries: true
  diagnostic_only: true

candidate_baseline:
  baseline_id: phase1_mindoro_focus_pre_spill_candidate_2016_2023_v1
  description: Staged focused Mindoro pre-spill candidate baseline artifact preserved as the source snapshot behind the finalized B1 recipe-provenance story
  source_kind: staged_production_candidate
  status_flag: provisional
  valid: false
  provisional: true
  rerun_required: false
  promotion_required: true
  selection_basis: Focused Mindoro pre-spill 2016-2023 drogued-only non-overlapping 72 h transport-validation rerun ranked on the February-April seasonal subset
  workflow_scope:
    - mindoro_retro_2023
  current_local_evidence_scope: experimental_mindoro_focused_pre_spill_2016_2023_regional_transport_validation_rerun
  notes:
    - This separate focused rerun now serves as the authoritative Mindoro-specific recipe-provenance lane for B1 while keeping the broader regional rerun preserved as reference.
    - This staged artifact is kept as a non-destructive provenance snapshot distinct from the official B1 baseline artifact in config/phase1_baseline_selection.yaml.
    - This experimental lane does not modify legacy 2016 prototype outputs or the canonical March 13 -> March 14 B1 outputs.
    - The staged candidate preserves the raw historical four-recipe winner even if the official B1 spill-usable fallback rule keeps a different non-GFS recipe.

official_baseline_update:
  enabled: true
  baseline_id: mindoro_phase1_focused_recipe_provenance_v2
  description: Current default Mindoro spill-case Phase 1 recipe provenance finalized from the separate focused pre-spill 2016-2023 Mindoro drifter rerun with the full four-recipe family
  source_kind: focused_mindoro_phase1_provenance_artifact
  selection_basis: Focused Mindoro pre-spill 2016-2023 drogued-only non-overlapping 72 h transport-validation rerun with the full four-recipe family ranked on the February-April seasonal subset; if a GFS recipe wins historically, official B1 adopts the highest-ranked non-GFS recipe from the same rerun
  workflow_scope:
    - mindoro_retro_2023
  current_local_evidence_scope: mindoro_focused_pre_spill_2016_2023_recipe_provenance
  current_local_evidence_dates:
    - 2016-2019 and 2021 accepted drifter segments within the focused Mindoro box
  notes:
    - Official Mindoro spill-case workflows inherit recipe provenance from this separate focused Phase 1 drifter rerun rather than from the preserved three-date 2016 prototype artifact.
    - The focused rerun now evaluates the full four-recipe family cmems_era5, cmems_gfs, hycom_era5, and hycom_gfs after a GFS completeness preflight across all accepted focused months.
    - This finalizes Mindoro-specific recipe provenance only and does not rewrite the raw-generation history of the stored March 13 -> March 14 B1 output bundle.
    - The broader 2016-2022 regional rerun remains preserved as a regional reference/governance lane and is not the active provenance for Mindoro B1.
    - The focused rerun searched through early 2023, but its accepted registry does not include near-2023 accepted segments.
