summary: >
  Promote March 13 -> March 14 as the canonical Phase 3B public-validation row in
  packaging, figures, and launcher/docs semantics without mutating the original
  March 3 -> March 6 official spill-case definition, while preserving the March
  13 -> March 14 R0 baseline and the March-family legacy rows as repo-preserved
  archive-only provenance material, keeping PyGNOME comparator-only, and pairing
  B1 with the separate focused Mindoro Phase 1 recipe-provenance lane.

