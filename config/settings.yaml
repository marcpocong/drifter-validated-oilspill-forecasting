# Settings and Core Application Constants

# Thesis-facing geographic semantics. Keep these concepts separate:
# - phase1_validation_box: Chapter 3 historical/regional transport-validation box
# - mindoro_case_domain: official Mindoro spill-case transport/scoring domain
# - legacy_prototype_display_domain: prototype/debug plotting extent only
# [min_lon, max_lon, min_lat, max_lat]
phase1_validation_box: [119.5, 124.5, 11.5, 16.5]
mindoro_case_domain: [115.0, 122.0, 6.0, 14.5]
legacy_prototype_display_domain: [115.0, 122.0, 6.0, 14.5]

# Workflow mode:
# - prototype_2021       preferred accepted-segment debug/demo workflow
# - prototype_2016       keeps the original multi-date debugging workflow
# - mindoro_retro_2023   runs the official Mindoro spill-case scoring workflow
# - dwh_retro_2010       runs the external Deepwater Horizon setup/scaffold workflow
# - phase1_regional_2016_2022 runs the dedicated full regional Phase 1 production rerun
# - phase1_mindoro_focus_pre_spill_2016_2023 runs a separate experimental Mindoro-focused
#   pre-spill drifter-calibration lane without changing the canonical Phase 1 baseline
workflow_mode: prototype_2021

# Workflow case file mappings
workflow_case_files:
  prototype_2021: config/prototype_2021_cases.yaml
  mindoro_retro_2023: config/case_mindoro_retro_2023.yaml
  dwh_retro_2010: config/case_dwh_retro_2010_72h.yaml
  phase1_regional_2016_2022: config/phase1_regional_2016_2022.yaml
  phase1_mindoro_focus_pre_spill_2016_2023: config/phase1_mindoro_focus_pre_spill_2016_2023.yaml

# Current default frozen Phase 1 baseline selection artifact for official spill-case workflows.
phase1_baseline_selection_path: config/phase1_baseline_selection.yaml

# Official Phase 1 historical/regional audit metadata. This is intentionally
# separate from the Mindoro spill-case domain and any prototype display extent
# so audit alignment does not silently change other workflow semantics.
phase1_official_audit:
  historical_window:
    start_date: "2016-01-01"
    end_date: "2022-12-31"
  phase1_validation_box: [119.5, 124.5, 11.5, 16.5]

# Deprecated compatibility alias. Thesis-facing code should resolve one of the
# explicit domain keys above instead of relying on `region`.
region: [115.0, 122.0, 6.0, 14.5]

# Prototype-only Phase 1 test date window (Golden Test)
# You can provide a single date string like "2016-09-17" 
# or a list of dates to scan: ["2020-03-05", "2021-06-10", "2022-09-15"]
phase_1_start_date: ["2016-09-01", "2016-09-06", "2016-09-17"]

# Prototype-only forcing halo (hours) applied symmetrically around the
# nominal 72 h case window so the preserved +/- 3 h ensemble jitter does not
# fall outside the prepared forcing coverage.
prototype_forcing_halo_hours: 3.0

# Standard Grid Resolution for Phase 2/3 (Degrees)
grid_resolution: 0.05

# Friendly names for visualization
recipe_component_names:
  hycom: "HYCOM Ocean Currents"
  ncep: "Legacy NCEP Prototype Winds"
  cmems: "CMEMS Global Ocean"
  era5: "ERA5 Reanalysis"
  gfs: "GFS Winds"


# ---------------------------------------------------------------------------
# Phase 3 – Oil Weathering Constants
# ---------------------------------------------------------------------------

# ADIOS oil identifiers used in config/oil.yaml
oil_adios_light: "AD03160"   # Marine Gas Oil  (light, highly evaporative)
oil_adios_heavy: "AD00256"   # IFO 380 / Bunker Fuel (heavy, persistent)

# Human-readable labels for charts and reports
oil_display_names:
  light: "Light Oil (Marine Gas Oil / Diesel)"
  heavy: "Heavy Oil (IFO 380 / Bunker Fuel)"

# Palette applied to mass-budget plots
oil_colors:
  light: "#FF8C00"   # dark orange
  heavy: "#4B0082"   # indigo

# Mass-budget component colours (shared across all oil types)
budget_colors:
  surface: "#1f77b4"     # blue
  evaporated: "#ff7f0e"  # orange
  dispersed: "#2ca02c"   # green
  beached: "#d62728"     # red


# ---------------------------------------------------------------------------
# Phase 3 – Diagnostics Constants
# ---------------------------------------------------------------------------

# NOAA operational defaults for OpenOil (from NOAA ERR / ADIOS guidance)
noaa_defaults:
  "seed:droplet_diameter_min_subsea": 0.0005   # 0.5 mm
  "seed:droplet_diameter_max_subsea": 0.005    # 5.0 mm
  "vertical_mixing:TSprofiles": false
  "wave_entrainment:droplet_size_distribution": "Johansen et al. (2015)"
  "wave_entrainment:entrainment_rate": "Li et al. (2017)"
  "drift:vertical_mixing": false               # OFF – surface-only transport
  "drift:wind_uncertainty": 0.0
  "drift:current_uncertainty": 0.0
  "processes:dispersion": true                 # ON – weathering
  "processes:evaporation": true                # ON – weathering
  "processes:emulsification": true             # ON – weathering
  "processes:update_oilfilm_thickness": true   # ON – spreading
  "general:use_auto_landmask": true

# Physically expected ranges for the South China Sea / Sulu Sea region
wind_speed_realistic_max_ms: 25.0     # m/s (typhoon threshold)
wave_height_realistic_max_m: 8.0      # m (severe storm)
wind_speed_moderate_ms: 12.0          # above this, heavy dispersion expected
